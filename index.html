<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/finance_pro/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Aprende finanzas corporativas con teoría esencial, fórmulas claras y calculadoras guiadas en español e inglés.">
  <meta name="theme-color" content="#1F5C50">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="index,follow">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finance Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>Finance Pro — Laboratorio de finanzas corporativas</title>

  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2ede4;
      color: #22302c;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #f2ede4;
    }

    .app-loader {
      box-sizing: border-box;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app-loader__content {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #22302c;
    }

    .app-loader__mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #1f5c50;
      color: #fffcf8;
      font-size: 22px;
      font-weight: 700;
      animation: loader-pulse 1.4s ease-in-out infinite;
    }

    .app-loader__name {
      margin: 0 0 3px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-loader__status {
      margin: 0;
      color: #52635d;
      font-size: 14px;
    }

    @keyframes loader-pulse {
      50% { opacity: 0.72; transform: scale(0.97); }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-loader__mark { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app-loader" id="app-loader" role="status" aria-live="polite">
    <div class="app-loader__content">
      <div class="app-loader__mark" aria-hidden="true">↗</div>
      <div>
        <p class="app-loader__name">Finance Pro</p>
        <p class="app-loader__status">Preparando el laboratorio financiero…</p>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('app-loader')?.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
