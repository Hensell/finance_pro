<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Conceptos, fórmulas y calculadoras para estudiar finanzas corporativas en español e inglés.">
  <meta name="theme-color" content="#1E5A4D">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="index,follow">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Finance Pro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>Finance Pro — Finanzas corporativas</title>

  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f3;
      color: #17211e;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #f4f5f3;
    }

    .app-loader {
      box-sizing: border-box;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app-loader__content {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #17211e;
    }

    .app-loader__name {
      margin: 0 0 3px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-loader__status {
      margin: 0;
      color: #5d6a65;
      font-size: 14px;
    }

    .app-loader__indicator {
      width: 18px;
      height: 18px;
      border: 2px solid #dce1dd;
      border-top-color: #1e5a4d;
      border-radius: 50%;
      animation: loader-spin 0.8s linear infinite;
    }

    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .app-loader__indicator { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app-loader" id="app-loader" role="status" aria-live="polite">
    <div class="app-loader__content">
      <div class="app-loader__indicator" aria-hidden="true"></div>
      <div>
        <p class="app-loader__name">Finance Pro</p>
        <p class="app-loader__status">Cargando contenido…</p>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('app-loader')?.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
