name: finance_pro
description: Finance education app rebuilt with clean architecture for web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  bloc: ^9.0.0
  cupertino_icons: ^1.0.9
  flutter_bloc: ^9.1.1
  flutter_tex: ^5.2.6
  freezed_annotation: ^3.1.0
  go_router: ^16.0.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  json_annotation: ^4.11.0

dev_dependencies:
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  golden_toolkit: ^0.15.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/content/es/
    - assets/content/en/

  fonts:
    - family: Manjari
      fonts:
        - asset: assets/fonts/Manjari/Manjari-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manjari/Manjari-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manjari/Manjari-Thin.ttf
          weight: 300
